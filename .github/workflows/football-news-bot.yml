name: Football News Bot

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      run_social_media:
        description: 'Post to social media'
        required: false
        default: 'true'
        type: boolean

  # Run on push to main branch (for testing)
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - '.github/workflows/**'

jobs:
  fetch-and-post-news:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [3.11]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Set up environment variables
      env:
        X_ENGLISH_USERNAME: ${{ secrets.X_ENGLISH_USERNAME }}
        X_ENGLISH_PASSWORD: ${{ secrets.X_ENGLISH_PASSWORD }}
        X_TURKISH_USERNAME: ${{ secrets.X_TURKISH_USERNAME }}
        X_TURKISH_PASSWORD: ${{ secrets.X_TURKISH_PASSWORD }}
      run: |
        echo "X_ENGLISH_USERNAME=$X_ENGLISH_USERNAME" >> $GITHUB_ENV
        echo "X_ENGLISH_PASSWORD=$X_ENGLISH_PASSWORD" >> $GITHUB_ENV
        echo "X_TURKISH_USERNAME=$X_TURKISH_USERNAME" >> $GITHUB_ENV
        echo "X_TURKISH_PASSWORD=$X_TURKISH_PASSWORD" >> $GITHUB_ENV
        
    - name: Run news aggregation
      id: fetch_news
      run: |
        echo "Starting news aggregation..."
        python football_news_aggregator.py
        
        # Check if news file was created
        if [ -f "latest_football_news.json" ]; then
          echo "news_available=true" >> $GITHUB_OUTPUT
          
          # Count news items
          NEWS_COUNT=$(python -c "import json; data=json.load(open('latest_football_news.json')); print(len(data.get('news', [])))")
          echo "news_count=$NEWS_COUNT" >> $GITHUB_OUTPUT
          echo "News aggregation completed: $NEWS_COUNT items"
        else
          echo "news_available=false" >> $GITHUB_OUTPUT
          echo "news_count=0" >> $GITHUB_OUTPUT
          echo "No news file generated"
        fi
        
    - name: Update website data
      if: steps.fetch_news.outputs.news_available == 'true'
      run: |
        # The latest_football_news.json will be committed back to the repo
        echo "News data ready for website"
        
    - name: Post to Telegram
      if: steps.fetch_news.outputs.news_available == 'true'
      env:
        TELEGRAM_TURKISH_BOT_TOKEN: ${{ secrets.TELEGRAM_TURKISH_BOT_TOKEN }}
        TELEGRAM_ENGLISH_BOT_TOKEN: ${{ secrets.TELEGRAM_ENGLISH_BOT_TOKEN }}
      run: |
        echo "📱 Starting Telegram posting..."
        
        # Create Telegram posting script
        cat > post_to_telegram.py << 'EOF'
        import os
        import sys
        import json
        import traceback
        from telegram_bot import TelegramBot
        
        def main():
            try:
                print("🚀 Starting Telegram posting...")
                
                # Load latest news
                if not os.path.exists('latest_football_news.json'):
                    print("❌ News file not found")
                    sys.exit(1)
                
                with open('latest_football_news.json', 'r', encoding='utf-8') as f:
                    data = json.load(f)
                
                news_items = data.get('news', [])
                
                if not news_items:
                    print("❌ No news items to post")
                    sys.exit(1)
                
                print(f"📰 Found {len(news_items)} news items")
                
                # Check tokens
                required_env = ['TELEGRAM_TURKISH_BOT_TOKEN', 'TELEGRAM_ENGLISH_BOT_TOKEN']
                missing_env = [var for var in required_env if not os.getenv(var)]
                
                if missing_env:
                    print(f"❌ Missing environment variables: {missing_env}")
                    sys.exit(1)
                
                print("✅ All tokens present")
                
                # Initialize Telegram bot
                bot = TelegramBot()
                
                # Post top news (10 items)
                top_news = sorted(news_items, key=lambda x: x.get('priority_score', 0), reverse=True)[:10]
                print(f"📝 Selected {len(top_news)} top news items for posting")
                
                posted_count = bot.post_news_batch(top_news, max_posts=10)
                print(f"✅ Posted {posted_count} news items to Telegram")
                
                if posted_count > 0:
                    print("🎉 Telegram posting SUCCESSFUL!")
                    sys.exit(0)
                else:
                    print("⚠️ No posts made")
                    sys.exit(0)
                    
            except Exception as e:
                print(f"💥 Telegram posting error: {e}")
                print("Full traceback:", traceback.format_exc())
                sys.exit(1)
        
        if __name__ == "__main__":
            main()
        EOF
        
        # Run Telegram posting
        python post_to_telegram.py || echo "Telegram posting completed with warning"
        
    - name: Commit updated news data
      if: steps.fetch_news.outputs.news_available == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Add the news file if it exists and has changed
        if [ -f "latest_football_news.json" ]; then
          git add latest_football_news.json
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # Pull latest changes first to avoid conflicts
            git pull --rebase || {
              echo "Rebase failed, trying merge strategy"
              git pull --no-rebase --strategy=recursive -X ours || {
                echo "Merge failed, force pushing"
                git commit -m "Update football news - $(date -u +%Y-%m-%d\ %H:%M\ UTC) - ${{ steps.fetch_news.outputs.news_count }} items" || true
                git push --force-with-lease || git push --force
                exit 0
              }
            }
            
            git commit -m "Update football news - $(date -u +%Y-%m-%d\ %H:%M\ UTC) - ${{ steps.fetch_news.outputs.news_count }} items"
            git push || {
              echo "Push failed, trying force push"
              git push --force-with-lease || git push --force
            }
          fi
        fi
        
    - name: Create summary
      if: always()
      run: |
        echo "## Football News Bot Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
        echo "- **News Available**: ${{ steps.fetch_news.outputs.news_available }}" >> $GITHUB_STEP_SUMMARY
        echo "- **News Count**: ${{ steps.fetch_news.outputs.news_count }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Workflow**: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "football_news.log" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recent Logs" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -10 football_news.log >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        fi
        
    - name: Upload logs as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: football-news-logs
        path: |
          football_news.log
          *.json
        retention-days: 7

# Deployment job (runs after news job completes successfully)
  deploy-website:
    needs: fetch-and-post-news
    runs-on: ubuntu-latest
    if: success() && contains(github.event_name, 'push') || contains(github.event_name, 'workflow_dispatch')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Pull latest changes
      run: git pull origin main
        
    - name: Deploy to Vercel (if configured)
      if: env.VERCEL_TOKEN != ''
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      run: |
        npm i -g vercel
        vercel --token $VERCEL_TOKEN --prod --yes
        
    - name: Deploy to Railway (if configured)
      if: env.RAILWAY_TOKEN != ''
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      run: |
        # Install Railway CLI
        curl -sSL https://railway.app/install.sh | sh
        railway login --token $RAILWAY_TOKEN
        railway up --service football-news-app
        
    - name: Deploy to Heroku (if configured)
      if: env.HEROKU_API_KEY != ''
      env:
        HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
      run: |
        # This would require additional Heroku setup
        echo "Heroku deployment would go here"